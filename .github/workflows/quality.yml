name: Code Quality

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  # ── Language detection ────────────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      is_jsts: ${{ steps.lang.outputs.is_jsts }}
      is_python: ${{ steps.lang.outputs.is_python }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: lang
        run: |
          [ -f "package.json" ] && echo "is_jsts=true" >> "$GITHUB_OUTPUT" || echo "is_jsts=false" >> "$GITHUB_OUTPUT"
          { [ -f "pyproject.toml" ] || [ -f "setup.py" ]; } && echo "is_python=true" >> "$GITHUB_OUTPUT" || echo "is_python=false" >> "$GITHUB_OUTPUT"

  # ── JS / TypeScript checks ────────────────────────────────────────────────
  quality-jsts:
    needs: detect
    if: needs.detect.outputs.is_jsts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Biome check
        run: npx biome ci --reporter=github .

      - name: ESLint
        run: npx eslint . --max-warnings 0

      - name: Type check
        run: npx tsc --noEmit

      - name: Knip — dead code
        run: npx knip --max-issues 0

      - name: TruffleHog — secret scan
        uses: trufflesecurity/trufflehog@d73edfb85d79432e3c767c407afdee59c9a34fde # v3.88.1
        with:
          extra_args: --only-verified

      - name: Test + coverage
        run: npx vitest run --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@4650159d642e33fdc30954ca22638caf0df6cac8 # v5.4.3
        with:
          fail_ci_if_error: true
          threshold: 80

      - name: CodeQL init
        uses: github/codeql-action/init@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15
        with:
          languages: javascript-typescript

      - name: CodeQL analyze
        uses: github/codeql-action/analyze@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15

      - name: SonarQube Cloud
        uses: SonarSource/sonarcloud-github-action@v3 # pin to SHA before production use
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Python checks ─────────────────────────────────────────────────────────
  quality-python:
    needs: detect
    if: needs.detect.outputs.is_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Pyright strict
        run: pyright

      - name: TruffleHog — secret scan
        uses: trufflesecurity/trufflehog@d73edfb85d79432e3c767c407afdee59c9a34fde # v3.88.1
        with:
          extra_args: --only-verified

      - name: Test + coverage
        run: pytest --cov --cov-fail-under=80 --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@4650159d642e33fdc30954ca22638caf0df6cac8 # v5.4.3
        with:
          fail_ci_if_error: true

      - name: CodeQL init
        uses: github/codeql-action/init@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15
        with:
          languages: python

      - name: CodeQL analyze
        uses: github/codeql-action/analyze@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15

      - name: SonarQube Cloud
        uses: SonarSource/sonarcloud-github-action@v3 # pin to SHA before production use
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
